name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Tauri App
        working-directory: .
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename exe file
        run: |
          mv src-tauri/target/release/JX3RaidManager.exe src-tauri/target/release/JX3RaidManager_${{ github.ref_name }}.exe || true

      - name: Debug - List bundle files
        shell: pwsh
        run: |
          Write-Host "=== NSIS bundle directory ==="
          if (Test-Path "src-tauri/target/release/bundle/nsis") {
            Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Recurse | ForEach-Object {
              Write-Host $_.FullName
            }
          } else {
            Write-Host "nsis directory does not exist!"
            Write-Host "=== All bundle directories ==="
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Directory | ForEach-Object {
              Write-Host $_.FullName
            }
          }
          Write-Host ""
          Write-Host "=== TAURI_SIGNING_PRIVATE_KEY set? ==="
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "Yes, length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          } else {
            Write-Host "NO - key is empty or not set!"
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          # 从 tauri.conf.json 读取版本号
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version

          # 查找 .nsis.zip.sig 签名文件
          $sigFile = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sigFile) {
            Write-Host "未找到 .nsis.zip.sig，尝试查找所有 .sig 文件..."
            $sigFile = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $sigFile) {
              Write-Error "未找到任何签名文件。请确保 TAURI_SIGNING_PRIVATE_KEY 已正确配置且格式正确"
              exit 1
            }
            Write-Host "在其他位置找到签名文件: $($sigFile.FullName)"
          }
          $signature = Get-Content $sigFile.FullName -Raw

          # 查找 .nsis.zip 安装包文件名
          $zipFile = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $zipFile) {
            # 回退：查找所有 nsis.zip
            $zipFile = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          $zipFileName = $zipFile.Name

          # 组装 Tauri 2 updater 标准格式的 latest.json
          $tagName = "${{ github.ref_name }}"
          $repoUrl = "https://github.com/${{ github.repository }}"
          $downloadUrl = "$repoUrl/releases/download/$tagName/$zipFileName"

          $latest = @{
            version = $version
            notes = "版本 $version 发布"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }

          $latest | ConvertTo-Json -Depth 4 | Out-File -Encoding utf8 latest.json
          Write-Host "已生成 latest.json:"
          Get-Content latest.json

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/JX3RaidManager_${{ github.ref_name }}.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
